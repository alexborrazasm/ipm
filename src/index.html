<!DOCTYPE html>

<html lang="en">

<head>
  <title>SplitWithMe</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Split expenses with your friends app.">
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" type="text/css" href="css/main.css">
</head>

<body>

  <header id="banner">
    <h1>SplitWithMe</h1>
  </header>

  <main>
    <aside>
      <!-- ERROR -->
      <div id="error-message" class="hidden">
      </div>
      <!-- Expense list -->
      <section id="expense-list">
        <h2>
          <i class="fa-solid fa-wallet" aria-hidden="true"></i>
          Expenses
          <button id="reload" class="circle-button">
            <i class="fa-solid fa-arrows-rotate"></i>
          </button>
        </h2>
        <search>
          <input type="text" placeholder="Search expense...">
        </search>
        <div class="loading"></div>
        <ul> <!-- list of expenses-->
          <li>
          </li>
        </ul>
      </section>
    </aside>
    <article id="content">
      <!-- Expense detail -->
      <section id="details">
        <h2>
          <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
          Expense Details
        </h2>
        <article>
          <h3>Pick an Expense</h3>
        </article>
      </section>

      <!-- Friends -->
      <section id="friends">
        <h2>
          <i class="fa-solid fa-user-group" aria-hidden="true"></i>
          Friends on expense
        </h2>
        <ul>
          <li>
            <i class="fa-solid fa-user friend-icon" aria-hidden="true"></i>
            <article>
              <h3>Nerea</h3>
              <p><span>Credit:</span>$60.00</p>
              <p><span>Debit:</span>$100.00</p>
            </article>
            <button type="button" class="circle-button" aria-label="Open friend menu">
              <i class="fa-solid fa-ellipsis-vertical" aria-hidden="true"></i>
            </button>
          </li>
          <li>
            <a href="#add-friend">
              <i class="fa-solid fa-user-plus friend-icon" aria-hidden="true"></i>
              <h3>Add Friend</h3>
            </a>
          </li>
        </ul>
      </section>
     
      <!-- Edit expense -->
      <section id="edit">
        <h2>
          <i class="fa-solid fa-pen-to-square" aria-hidden="true"></i>
          Edit Expense
        </h2>
        <article>
        </article>
      </section>

      <!-- Add friend to expense -->
      <section id="add">
        <h2>
          <i class="fa-solid fa-user-plus" aria-hidden="true"></i> Add Friend
        </h2>
        <search>
          <input type="text" placeholder="Search expense...">
        </search>
        <ul>
          <li>
            <a href="#add-friend-marcos">
              <i class="fa-solid fa-user friend-icon" aria-hidden="true"></i>
              <h3>Marcos</h3>
            </a>
          </li>
        </ul>
      </section>

      <!-- Dialog: add credit to friends or confirm remove -->
      <dialog id="remove-friend">
        <h2>
          <i class="fa-solid fa-user-minus" aria-hidden="true"></i>Remove Friend
        </h2>
          <p>
            Do you want to remove "Dani" from this expense?
          </p>
          <div class="two-buttons">
            <button type="button" class="form-button cancel-button">
              Cancel
            </button>
            <button type="submit" class="form-button confirm-button">
              Confirm
          </div>
        </form>
      </dialog>

      <dialog id="add-credit">
        <h2>
          <i class="fa-solid fa-coins" aria-hidden="true"></i>Add Credit
        </h2>
        <form class="card">
          <label for="add-credit-input" class="form-label">
          How much credit do you want to add to 'Alex' for 'Travel to A Coruña'?
          </label>
          <input
            type="number"
            id="add-credit-input"
            name="add-credit"
            class="form-input"
            value="233.00" required
          >      
        </form>
        <div class="two-buttons">
          <button type="button" class="form-button cancel-button">
            Cancel
          </button>
          <button type="submit" class="form-button confirm-button">
            Confirm
          </button>
        </div>
      </dialog>

    </article>

  </main>
  
  <footer>
    <i class="fa-regular fa-copyright" aria-hidden="true"></i>
    <p>2025 IPM  Rage Against the Machine</p>
  </footer>
  
  <script type="module" src="./js/main.js"></script>

</body>

</html>
